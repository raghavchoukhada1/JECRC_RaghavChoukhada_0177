<h2>Task List</h2>

<ul>
  <li *ngFor="let task of tasks">
    
    <input 
      type="checkbox" 
      [checked]="task.completed" 
      (change)="toggleStatus(task)"
    />

    <span [class.completed]="task.completed">
      {{ task.title }}
    </span>

    <button (click)="deleteTask(task.id)">❌</button>

  </li>
</ul>

<p *ngIf="tasks.length === 0">No tasks yet 🚀</p>
