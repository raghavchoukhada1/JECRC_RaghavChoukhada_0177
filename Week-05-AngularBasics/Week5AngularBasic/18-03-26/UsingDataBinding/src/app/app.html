<h2>Product Order System</h2>
<h3>Product Name: {{ productName }}</h3>
<p>Price: ${{ price }}</p>
<img [src]="imageUrl" width ="200">
<br><br>
<button (click)="incrementQty()">+</button>
<button (click)="decrementQty()">-</button>
<p>Quantity: {{ quantity }}</p>
<br><br>
<button [disabled]="!isAvailable" (click)="toggleAvailability()">
  {{ isAvailable ? 'Place Order' : 'Out of Stock' }}</button>
<br><br>
<h3>Customer Details  </h3>
<input type="text" [(ngModel)]="customerName" placeholder="Enter your name">
<br><br>
<textarea [(ngModel)]="address" placeholder="Enter your address"></textarea>
<br><br>
<h3>Order Summary</h3>
<p>Name: {{ customerName }}</p>
<p>Address: {{ address }}</p>
<p>Total Amount : ${{ totalPrice }}</p>
