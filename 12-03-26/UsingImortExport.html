<script type="module">

const Utils = `
export const PI = 3.14159;

export function addition(a,b){
  return a + b;
}

export function multiply(a,b){
  return a * b;
}

export function subtract(a,b){
  return a - b;
}

export function division(a,b){
  return a / b;
}
`;

const blob = new Blob([Utils], { type: 'text/javascript' });
const url = URL.createObjectURL(blob);

import(url).then(module => {
  console.log('PI:', module.PI);
  console.log('Addition:', module.addition(5, 3));   
  console.log('Multiplication:', module.multiply(5, 3));
  console.log('Subtraction:', module.subtract(5, 3));
  console.log('Division:', module.division(5, 3));
}).catch(err => {
  console.error('Error loading module:', err);
});

</script>
