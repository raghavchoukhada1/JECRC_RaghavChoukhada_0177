services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ems-sql
    environment:
      SA_PASSWORD: "YourStrong@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  api:
    build: ./Api
    container_name: ems-api
    ports:
      - "5001:5000"
    depends_on:
      - sqlserver
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EMSDB;User=sa;Password=YourStrong@123;TrustServerCertificate=True

  mvc:
    build: ./Mvc
    container_name: ems-mvc
    ports:
      - "5002:5000"
    depends_on:
      - api
    environment:
      - ApiBaseUrl=http://api:5000